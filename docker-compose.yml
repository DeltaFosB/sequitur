version: "3.8"

services:
  loki:
    image: grafana/loki:2.9.0
    container_name: sequitur-loki-1
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - telemetry

  grafana:
    image: grafana/grafana:10.2.0
    container_name: sequitur-grafana-1
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      # Automatically register Loki as the default data source inside Grafana on startup
      - ./grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      # Automatically configure Grafana to watch local directory targets for dashboard templates
      - ./grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      # Inject your specific Sequitur Performance Monitor JSON blueprint into the watched directory
      - ./sequitur_dashboard.json:/var/lib/grafana/dashboards/sequitur_dashboard.json
    networks:
      - telemetry

networks:
  telemetry:
    driver: bridge
