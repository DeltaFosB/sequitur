# ==============================================================================
# 1. Global Configuration Layer (Strictly at the absolute top of the file)
# ==============================================================================
data_dir = "/tmp"

# ==============================================================================
# 2. Ingress Infrastructure Sources
# ==============================================================================
[sources.sequitur_logs]
type = "file"
include = ["/dev/shm/sequitur/telemetry.log"]
read_from = "beginning"

# ==============================================================================
# 3. Stream Transformation Pipelines
# ==============================================================================
[transforms.parse_json]
type = "remap"
inputs = ["sequitur_logs"]
source = """
# 1. Instantly drop auxiliary lines or unformed text chunks
if !starts_with(string!(.message), "{") {
    abort
}

# 2. Extract the high-velocity JSON properties safely
parsed, err = parse_json(.message)
if err != null {
    abort
}

# 3. Flatten the event context payload
. = merge!(., parsed)
del(.message)
del(.file)
del(.host)

# 4. FIXED: Parentheses guarantee safe string concatenation fallbacks
.metric_name = "sequitur_" + (string(.latency_scope) ?? "unknown_scope")
"""

# ==============================================================================
# 4. Egress Storage Sinks
# ==============================================================================
[sinks.grafana_loki]
type = "loki"
inputs = ["parse_json"]
endpoint = "http://loki:3100"
encoding.codec = "json"

# FORCE LOW-LATENCY FLUSHES FOR REAL-TIME MONITORING
[sinks.grafana_loki.batch]
max_bytes = 1048576      # Flush instantly at 1MB capacity
timeout_secs = 1         # Force chunk transmission every 1 second maximum

[sinks.grafana_loki.labels]
app = "sequitur_engine"
