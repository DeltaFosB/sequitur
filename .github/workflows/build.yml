name: "Sequitur CI Pipeline"
on:
  push:
    branches: [ main ]
  pull_request: 
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Source Code"
        uses: actions/checkout@v4

      - name: "Install System Dependencies"
        run: sudo apt-get update && sudo apt-get install -y liburing-dev

      - name: "Configure CMake Build"
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: "Compile Engine & Test Suites"
        run: cmake --build build --parallel $(nproc)

      - name: "Execute Automated Tests"
        run: |
          echo "### Dynamic Test Suite Execution Summary" >> $GITHUB_STEP_SUMMARY
          
          # 1. Run Unit Tests and export metrics to JSON
          ./build/unit_tests --gtest_output=json:build/unit_results.json --gtest_brief=1
          UNIT_PASSED=$(jq '.tests - .failures' build/unit_results.json)
          UNIT_TOTAL=$(jq '.tests' build/unit_results.json)
          echo "- **Unit Tests:** Passed ${UNIT_PASSED}/${UNIT_TOTAL} structural invariants." >> $GITHUB_STEP_SUMMARY
          
          # 2. Run Integration Tests and export metrics to JSON
          ./build/integration_tests --gtest_output=json:build/int_results.json --gtest_brief=1
          INT_PASSED=$(jq '.tests - .failures' build/int_results.json)
          INT_TOTAL=$(jq '.tests' build/int_results.json)
          echo "- **Integration Tests:** Passed ${INT_PASSED}/${INT_TOTAL} pipeline flows." >> $GITHUB_STEP_SUMMARY

      - name: "Execute Performance Benchmarks"
        run: |
          echo "### Hot-Path Performance Benchmarks" >> $GITHUB_STEP_SUMMARY
          
          # Append the raw text output of your benchmark track directly into the markdown summary
          echo "\`\`\`text" >> $GITHUB_STEP_SUMMARY
          ./build/benchmarks >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
